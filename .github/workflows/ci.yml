name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python manage.py test
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "true"
