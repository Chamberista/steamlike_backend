name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: steamlike
          POSTGRES_USER: steamlike
          POSTGRES_PASSWORD: steamlike
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python manage.py test
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "true"
          POSTGRES_HOST: localhost
          POSTGRES_DB: steamlike
          POSTGRES_USER: steamlike
          POSTGRES_PASSWORD: steamlike

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
